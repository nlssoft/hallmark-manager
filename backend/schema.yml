          maxLength: 455
        number:
          type: string
          nullable: true
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        address:
          type: string
          nullable: true
        logo:
          type: string
          nullable: true
          maxLength: 10
