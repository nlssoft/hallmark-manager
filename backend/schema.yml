  /core/audit-log/:
    get:
      operationId: core_audit_log_list
      parameters:
      - in: query
        name: action
        schema:
          type: string
          enum:
          - d
          - u
        description: |-
          * `u` - UPDATE
          * `d` - DELETE
      - in: query
        name: date_after
        schema:
          type: string
          format: date
      - in: query
        name: date_before
        schema:
          type: string
          format: date
      - in: query
        name: model
        schema:
          type: string
          enum:
          - p
          - r
        description: |-
          * `r` - Record
          * `p` - Payment
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - core
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
