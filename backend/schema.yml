            $ref: '#/components/schemas/NestedEmployee'
          readOnly: true
        due:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        surplus:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - due
      - employee
      - groups
      - name
      - public_id
      - surplus
    Employee:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
        re_password:
          type: string
          writeOnly: true
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - password
      - public_id
      - re_password
      - username
