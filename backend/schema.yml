        customer:
          type: array
          items:
            type: string
            format: uuid
      required:
      - customer
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    User:
      type: object
      description: User model w/o password
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
        profile:
          allOf:
          - $ref: '#/components/schemas/Profile'
          nullable: true
        subscription:
          allOf:
          - $ref: '#/components/schemas/Subscription'
          readOnly: true
      required:
      - email
      - public_id
      - subscription
      - username
    VerifyEmailOTP:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - email
      - otp
    WriteGroup:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        description:
          type: string
          nullable: true
          maxLength: 255
        service:
          type: string
          format: uuid
          nullable: true
        rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
      required:
      - public_id
    WritePayment:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        customer:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/ModeEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        image:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - amount
      - customer
      - public_id
    WriteRecord:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        customer:
          type: string
          format: uuid
        service:
          type: string
          format: uuid
        pcs:
          type: integer
          maximum: 2147483647
          minimum: 1
        created_at:
          type: string
          format: date-time
        rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        pay:
          type: boolean
          writeOnly: true
          default: false
      required:
      - customer
      - pcs
      - public_id
      - service
    WriteRequest:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        record:
          type: array
          items:
            type: string
            format: uuid
          writeOnly: true
      required:
      - public_id
      - record
    sync_customer:
      type: object
      properties:
        customer:
          type: array
          items:
            type: string
            format: uuid
      required:
      - customer
  securitySchemes:
    jwtCookieAuth:
      type: apiKey
      in: cookie
      name: access-token
    jwtHeaderAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
