          type: string
          writeOnly: true
        password2:
          type: string
          writeOnly: true
        number:
          type: string
          maxLength: 15
        company_name:
          type: string
          maxLength: 255
        company_address:
          type: string
          maxLength: 600
        office_number1:
          type: string
          maxLength: 15
        office_number2:
          type: string
          maxLength: 15
      required:
      - number
      - password1
      - password2
      - username
    Customer:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
          readOnly: true
        name:
