  /auth/change-email/:
    post:
      operationId: auth_change_email_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailOTP'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangeEmailOTP'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangeEmailOTP'
        required: true
      security:
