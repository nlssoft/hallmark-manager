components:
  schemas:
    ActionEnum:
      enum:
      - u
      - d
      type: string
      description: |-
        * `u` - UPDATE
        * `d` - DELETE
    AdvanceLog:
      type: object
      properties:
        customers:
          allOf:
          - $ref: '#/components/schemas/CustomerNested'
          readOnly: true
        payments:
          allOf:
          - $ref: '#/components/schemas/PaymentNested'
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        records:
          type: string
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - created_at
      - customers
      - payments
      - records
      - total_amount
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        model:
          allOf:
          - $ref: '#/components/schemas/ModelEnum'
          readOnly: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
        before:
          readOnly: true
          nullable: true
        after:
          readOnly: true
          nullable: true
        logged_at:
          type: string
          format: date-time
          readOnly: true
        reason:
          type: string
          readOnly: true
          nullable: true
      required:
      - action
      - after
      - before
      - id
      - logged_at
      - model
      - reason
    ChangeEmailOTP:
      type: object
      properties:
        otp:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - otp
    CustomCookieOnlyJwt:
      type: object
      description: Serializer for JWT authentication.
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          type: string
          readOnly: true
      required:
      - access
      - refresh
      - user
    CustomRegister:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
          minLength: 1
        email:
          type: string
          format: email
        password1:
          type: string
          writeOnly: true
        password2:
          type: string
          writeOnly: true
        number:
          type: string
          maxLength: 15
        company_name:
          type: string
          maxLength: 255
        company_address:
          type: string
          maxLength: 600
        office_number1:
          type: string
          maxLength: 15
        office_number2:
          type: string
          maxLength: 15
      required:
      - number
      - password1
      - password2
      - username
    Customer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 455
        number:
          type: string
          nullable: true
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        address:
          type: string
          nullable: true
        logo:
          type: string
          nullable: true
          maxLength: 10
        groups:
          allOf:
          - $ref: '#/components/schemas/CustomerReadOnlyGroup'
          readOnly: true
        employee:
          type: array
          items:
            $ref: '#/components/schemas/ReadOnlyEmployee'
          readOnly: true
        due:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        surplus:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - due
      - employee
      - groups
      - id
      - name
      - surplus
    CustomerNested:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        logo:
          type: string
          readOnly: true
          nullable: true
        name:
          type: string
          readOnly: true
        address:
          type: string
          readOnly: true
          nullable: true
        number:
          type: string
          readOnly: true
          nullable: true
        email:
          type: string
          format: email
          readOnly: true
          nullable: true
      required:
      - address
      - email
      - id
      - logo
      - name
      - number
    CustomerReadOnlyGroup:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 255
        services:
          type: array
          items:
            $ref: '#/components/schemas/GroupRateNested'
          readOnly: true
      required:
      - id
      - name
      - services
    Employee:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
        re_password:
          type: string
          writeOnly: true
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - password
      - pk
      - re_password
      - username
    GroupRateNested:
      type: object
      properties:
        service_id:
          type: integer
        service_name:
          type: string
        service_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - service_id
      - service_name
      - service_rate
    Login:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - password
    ModeEnum:
      enum:
      - c
      - o
      type: string
      description: |-
        * `c` - CASH
        * `o` - ONLINE
    ModelEnum:
      enum:
      - r
      - p
      type: string
      description: |-
        * `r` - Record
        * `p` - Payment
    PasswordChange:
      type: object
      properties:
        old_password:
          type: string
          maxLength: 128
        new_password1:
          type: string
          maxLength: 128
        new_password2:
          type: string
          maxLength: 128
      required:
      - new_password1
      - new_password2
      - old_password
    PasswordReset:
      type: object
      description: Serializer for requesting a password reset e-mail.
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PasswordResetConfirm:
      type: object
      description: Serializer for confirming a password reset attempt.
      properties:
        new_password1:
          type: string
          maxLength: 128
        new_password2:
          type: string
          maxLength: 128
        uid:
          type: string
        token:
          type: string
      required:
      - new_password1
      - new_password2
      - token
      - uid
    PatchedCustomer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 455
        number:
          type: string
          nullable: true
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        address:
          type: string
          nullable: true
        logo:
          type: string
          nullable: true
          maxLength: 10
        groups:
          allOf:
          - $ref: '#/components/schemas/CustomerReadOnlyGroup'
          readOnly: true
        employee:
          type: array
          items:
            $ref: '#/components/schemas/ReadOnlyEmployee'
          readOnly: true
        due:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        surplus:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
    PatchedPayment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer:
          type: integer
        customers:
          allOf:
          - $ref: '#/components/schemas/CustomerNested'
          readOnly: true
        mode:
          $ref: '#/components/schemas/ModeEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        image:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
    PatchedService:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
    PatchedUpdateRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer:
          type: integer
        service:
          type: integer
        pcs:
          type: integer
          maximum: 2147483647
          minimum: 1
        created_at:
          type: string
          format: date-time
        rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
    PatchedUser:
      type: object
      description: User model w/o password
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
        profile:
          allOf:
          - $ref: '#/components/schemas/Profile'
          nullable: true
    Payment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer:
          type: integer
        customers:
          allOf:
          - $ref: '#/components/schemas/CustomerNested'
          readOnly: true
        mode:
          $ref: '#/components/schemas/ModeEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        image:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - amount
      - customer
      - customers
      - id
    PaymentNested:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mode:
          allOf:
